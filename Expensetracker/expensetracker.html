<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="expensetracker.css">

    <title>Expense Tracker</title>
</head>

<body>

<div class="main">

    <!-- SIDEBAR -->
    <nav class="sidebar">

        <div class="pfp">
            <img src="pfp_pic.jpg" id="profilePic">
            <p class="username">Azaan</p>
        </div>

        <ul class="menu">

            <li onclick="showHome()" class="active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </li>

            <li onclick="showAddExpense()">
                <i class="fa-solid fa-plus"></i>
                <span>Add Expense</span>
            </li>

            <li onclick="showExpenses()">
                <i class="fa-solid fa-wallet"></i>
                <span>View Expenses</span>
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </li>

        </ul>

    </nav>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- HOME SECTION -->
        <div id="homeSection">
            <h1>Dashboard</h1>
        </div>

        <!-- ADD EXPENSE SECTION -->
        <div id="addExpenseSection" style="display:none;">
            <h1>Add Expense</h1>
        </div>

        <!-- VIEW EXPENSES SECTION -->
        <div id="viewExpenseSection" style="display:none;">
            <h1>All Expenses</h1>
        </div>

    </div>

</div>

</body>
</html>
